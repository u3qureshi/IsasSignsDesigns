spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:backend/.env[.properties]
  datasource:
    url: jdbc:postgresql://localhost:5432/isa_sd
    username: isa_user
    password: isa_pass
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  flyway:
    baseline-on-migrate: true
    baseline-version: 1
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 25MB
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:25}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS_ENABLED:false}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: 8081

app:
  time-zone: ${APP_TIME_ZONE:America/Toronto}
  custom-embroidery:
    max-upload-bytes: ${CUSTOM_EMBROIDERY_MAX_UPLOAD_BYTES:10485760}
    allowed-image-types: ${CUSTOM_EMBROIDERY_ALLOWED_IMAGE_TYPES:image/png,image/jpeg,image/webp}
    hmac-secret: ${CUSTOM_EMBROIDERY_HMAC_SECRET:}
  cloudflare:
    account-id: ${CLOUDFLARE_ACCOUNT_ID:}
    api-token: ${CLOUDFLARE_API_TOKEN:}
    ai-model: ${CLOUDFLARE_AI_MODEL:@cf/black-forest-labs/flux-2-klein-4b}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    delivery-type: ${CLOUDINARY_DELIVERY_TYPE:authenticated}
  notifications:
    admin-email: ${THREAD_AND_BUTTER_ADMIN_EMAIL:}
    admin-phone: ${THREAD_AND_BUTTER_ADMIN_PHONE:}
    email:
      enabled: ${EMAIL_NOTIFICATIONS_ENABLED:false}
      from-address: ${EMAIL_FROM_ADDRESS:}
    sms:
      enabled: ${SMS_NOTIFICATIONS_ENABLED:false}
      from-number: ${TWILIO_FROM_NUMBER:}
      twilio-account-sid: ${TWILIO_ACCOUNT_SID:}
      twilio-auth-token: ${TWILIO_AUTH_TOKEN:}
